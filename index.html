<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keen CDP</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell" id="appShell">
      <header class="topbar">
        <div class="brand-block">
          <button class="icon-button app-switcher" id="sidebarToggle" aria-label="隐藏或显示侧边栏" title="隐藏或显示侧边栏">
            <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
          </button>
          <div class="brand-mark">K</div>
          <div class="brand-text">
            <strong>Keen CDP</strong>
          </div>
        </div>
        <nav class="top-nav" id="topNav" aria-label="二级导航"></nav>
        <div class="top-actions">
          <select class="tenant-select" aria-label="租户">
            <option>test_tenant(验证租户)</option>
            <option>keen_vending_prod</option>
          </select>
          <button class="icon-button" data-action="任务中心" aria-label="任务中心" title="任务中心">
            <svg viewBox="0 0 24 24"><path d="M4 5h16v14H4V5Zm3 3v2h2V8H7Zm4 0v2h6V8h-6Zm-4 5v2h2v-2H7Zm4 0v2h6v-2h-6Z"/></svg>
          </button>
          <button class="icon-button" data-action="告警中心" aria-label="告警中心" title="告警中心">
            <svg viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 0-6 6v3.2L4 16v1h16v-1l-2-3.8V9a6 6 0 0 0-6-6Zm-2 15h4a2 2 0 0 1-4 0Z"/></svg>
          </button>
          <button class="icon-button" data-action="帮助文档" aria-label="文档" title="帮助文档">
            <svg viewBox="0 0 24 24"><path d="M4 5.5h7.2c1.1 0 2 .9 2 2v11H6c-1.1 0-2-.9-2-2v-11Zm16 0h-7.2c-1.1 0-2 .9-2 2v11H18c1.1 0 2-.9 2-2v-11Z"/></svg>
          </button>
          <button class="icon-button" data-action="账号设置" aria-label="用户" title="账号设置">
            <svg viewBox="0 0 24 24"><path d="M12 12.2a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm-7.5 8c.8-3.5 3.7-5.6 7.5-5.6s6.7 2.1 7.5 5.6H4.5Z"/></svg>
          </button>
          <span class="version">v1.0.0</span>
        </div>
      </header>

      <aside class="sidebar">
        <button class="side-item active" data-group="analysis">
          <svg viewBox="0 0 24 24"><path d="M4 19h16v2H4v-2Zm1-3 4.2-4.2 3.2 2.7L18.6 7H15V5h7v7h-2V8.5l-7.3 8.8-3.3-2.8L6.4 17 5 16Z"/></svg>
          <span>分析中心</span>
        </button>
        <button class="side-item" data-group="assets">
          <svg viewBox="0 0 24 24"><path d="M12 12a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Zm-7 8c.7-3.8 3.3-6 7-6s6.3 2.2 7 6H5Z"/></svg>
          <span>客户资产</span>
        </button>
        <button class="side-item" data-group="activation">
          <svg viewBox="0 0 24 24"><path d="M4 10v4h3l8 4V6l-8 4H4Zm13.5-.8v5.6c1-.5 1.5-1.4 1.5-2.8s-.6-2.3-1.5-2.8Z"/></svg>
          <span>运营触达</span>
        </button>
        <button class="side-item" data-group="experimentation">
          <svg viewBox="0 0 24 24"><path d="M8 3h8v2h-1v5.2l4.7 8.1A2.5 2.5 0 0 1 17.5 22h-11a2.5 2.5 0 0 1-2.2-3.7L9 10.2V5H8V3Zm3 8-2.2 3.8h6.4L13 11V5h-2v6Z"/></svg>
          <span>实验优化</span>
        </button>
        <button class="side-item" data-group="ai">
          <svg viewBox="0 0 24 24"><path d="M12 2 14.2 8l6 2.2-6 2.2L12 18l-2.2-5.6-6-2.2 6-2.2L12 2Zm6 12 1.1 3 2.9 1.1-2.9 1.1L18 22l-1.1-2.8-2.9-1.1 2.9-1.1L18 14Z"/></svg>
          <span>AI 应用</span>
        </button>
        <button class="side-item" data-group="reports">
          <svg viewBox="0 0 24 24"><path d="M5 4h14v3H5V4Zm0 5h14v11H5V9Zm2 2v7h2v-7H7Zm4 3v4h2v-4h-2Zm4-2v6h2v-6h-2Z"/></svg>
          <span>经营复盘</span>
        </button>
        <button class="side-item" data-group="settings">
          <svg viewBox="0 0 24 24"><path d="M11 3h2l.5 2.2c.7.2 1.3.4 1.9.8l1.9-1.2 1.4 1.4-1.2 1.9c.3.6.6 1.2.8 1.9l2.2.5v2l-2.2.5c-.2.7-.4 1.3-.8 1.9l1.2 1.9-1.4 1.4-1.9-1.2c-.6.3-1.2.6-1.9.8L13 21h-2l-.5-2.2c-.7-.2-1.3-.4-1.9-.8l-1.9 1.2-1.4-1.4 1.2-1.9c-.3-.6-.6-1.2-.8-1.9L3.5 13v-2l2.2-.5c.2-.7.4-1.3.8-1.9L5.3 6.7l1.4-1.4L8.6 6c.6-.3 1.2-.6 1.9-.8L11 3Zm1 6.2a2.8 2.8 0 1 0 0 5.6 2.8 2.8 0 0 0 0-5.6Z"/></svg>
          <span>平台管理</span>
        </button>
        <button class="collapse-button" id="collapseButton">
          <svg viewBox="0 0 24 24"><path d="M4 6h14v2H4V6Zm0 5h10v2H4v-2Zm0 5h14v2H4v-2Zm16-5 3 3-3 3v-6Z"/></svg>
          <span>收起菜单</span>
        </button>
      </aside>

      <main class="main-content">
        <section class="page active" id="growth"></section>
        <section class="page" id="events"></section>
        <section class="page" id="funnel"></section>
        <section class="page" id="profiles"></section>
        <section class="page" id="segments"></section>
        <section class="page" id="campaigns"></section>
        <section class="page" id="experiments"></section>
        <section class="page" id="ai"></section>
        <section class="page" id="attribution"></section>
        <section class="page" id="settings"></section>
      </main>
      <div class="toast" id="toast" role="status" aria-live="polite"></div>
      <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
          <div class="modal-header">
            <h2 id="modalTitle">操作确认</h2>
            <button class="icon-button" id="modalClose" aria-label="关闭">
              <svg viewBox="0 0 24 24"><path d="m6.4 5 5.6 5.6L17.6 5 19 6.4 13.4 12 19 17.6 17.6 19 12 13.4 6.4 19 5 17.6l5.6-5.6L5 6.4 6.4 5Z"/></svg>
            </button>
          </div>
          <div class="modal-body" id="modalBody"></div>
          <div class="modal-footer">
            <button class="secondary-button" id="modalCancel">取消</button>
            <button class="primary-button" id="modalConfirm">确认</button>
          </div>
        </div>
      </div>
      <aside class="detail-drawer" id="detailDrawer" aria-hidden="true">
        <div class="drawer-header">
          <h2 id="drawerTitle">详情</h2>
          <button class="icon-button" id="drawerClose" aria-label="关闭详情">
            <svg viewBox="0 0 24 24"><path d="m6.4 5 5.6 5.6L17.6 5 19 6.4 13.4 12 19 17.6 17.6 19 12 13.4 6.4 19 5 17.6l5.6-5.6L5 6.4 6.4 5Z"/></svg>
          </button>
        </div>
        <div class="drawer-body" id="drawerBody"></div>
      </aside>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
